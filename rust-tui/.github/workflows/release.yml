name: Release

on:
  push:
    tags:
      - 'v*'  # 推送 v0.5.0 等标签时触发
  workflow_dispatch:  # 也可以手动触发

permissions:
  contents: write

jobs:
  # Linux x86_64 构建
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build
        run: cargo build --profile dist
        working-directory: ./rust-tui
      
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-x86_64.tar.gz -C target/dist pad
        working-directory: ./rust-tui
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: rust-tui/dist/*.tar.gz

  # Linux ARM64 构建（使用交叉编译）
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu
      
      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      
      - name: Build
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --profile dist --target aarch64-unknown-linux-gnu
        working-directory: ./rust-tui
      
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-aarch64.tar.gz -C target/aarch64-unknown-linux-gnu/dist pad
        working-directory: ./rust-tui
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: rust-tui/dist/*.tar.gz

  # macOS 构建（支持 Intel + Apple Silicon）
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      
      # 构建 Universal Binary（同时支持 Intel 和 Apple Silicon）
      - name: Build Intel
        run: cargo build --profile dist --target x86_64-apple-darwin
        working-directory: ./rust-tui
      
      - name: Build ARM64
        run: cargo build --profile dist --target aarch64-apple-darwin
        working-directory: ./rust-tui
      
      - name: Create Universal Binary
        run: |
          mkdir -p target/dist/universal
          lipo -create \
            target/x86_64-apple-darwin/dist/pad \
            target/aarch64-apple-darwin/dist/pad \
            -output target/dist/universal/pad
        working-directory: ./rust-tui
      
      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-macos-universal.tar.gz -C target/dist/universal pad
        working-directory: ./rust-tui
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: rust-tui/dist/*.tar.gz

  # 创建 GitHub Release 并上传所有二进制
  release:
    needs: [build-linux, build-linux-arm64, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## 安装

            ### Linux/macOS (快速安装)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            ### 手动下载
            根据你的平台下载对应文件：
            - **Linux x86_64**: `pad-*-linux-x86_64.tar.gz`
            - **Linux ARM64**: `pad-*-linux-aarch64.tar.gz`
            - **macOS**: `pad-*-macos-universal.tar.gz` (支持 Intel 和 Apple Silicon)

            ```bash
            tar -xzf pad-*.tar.gz
            mv pad ~/.local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
