name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "not a tag push"; exit 1; }
          tag_ver="${GITHUB_REF_NAME#v}"
          cargo_ver="$(grep -m1 '^version' rust-tui/Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          [[ "${tag_ver}" == "${cargo_ver}" || "${tag_ver}" =~ ^${cargo_ver}[-._][A-Za-z0-9._-]+$ ]] || {
            echo "tag version ${tag_ver} is not compatible with Cargo.toml ${cargo_ver}"
            exit 1
          }

  build-linux:
    needs: tag-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Build debug binary for smoke
        run: cargo build

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"

      - name: Build dist
        run: cargo build --profile dist

      - name: Smoke packaged binary
        run: |
          ./target/dist/pad --help
          ./target/dist/pad --version

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-x86_64.tar.gz -C target/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: rust-tui/dist/*.tar.gz

  build-linux-arm64:
    needs: tag-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --profile dist --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-aarch64.tar.gz -C target/aarch64-unknown-linux-gnu/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64
          path: rust-tui/dist/*.tar.gz

  build-macos:
    needs: tag-check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Install tmux
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install tmux
          fi

      - name: Build debug binary for smoke
        run: cargo build

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"

      - name: Build Intel
        run: cargo build --profile dist --target x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --profile dist --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/dist/universal
          lipo -create \
            target/x86_64-apple-darwin/dist/pad \
            target/aarch64-apple-darwin/dist/pad \
            -output target/dist/universal/pad

      - name: Smoke packaged binary
        run: |
          ./target/dist/universal/pad --help
          ./target/dist/universal/pad --version

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-macos-universal.tar.gz -C target/dist/universal pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: rust-tui/dist/*.tar.gz

  release:
    needs:
      - build-linux
      - build-linux-arm64
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### Linux/macOS/WSL2
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            `pad` requires `tmux` at runtime. On WSL2, install and run both `tmux` and `pad` inside WSL.

            ### Manual download
            - Linux x86_64: `pad-*-linux-x86_64.tar.gz`
            - Linux ARM64: `pad-*-linux-aarch64.tar.gz`
            - macOS universal: `pad-*-macos-universal.tar.gz`

            ```bash
            tar -xzf pad-*.tar.gz
            mv pad ~/.local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
