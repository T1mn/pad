name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CROSS_VERSION: "0.2.5"

jobs:
  tag-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          [[ "${GITHUB_REF_TYPE}" == "tag" ]] || { echo "not a tag push"; exit 1; }
          tag_ver="${GITHUB_REF_NAME#v}"
          cargo_ver="$(grep -m1 '^version' rust-tui/Cargo.toml | sed -E 's/version *= *"([^"]+)".*/\1/')"
          [[ "${tag_ver}" == "${cargo_ver}" || "${tag_ver}" =~ ^${cargo_ver}[-._][A-Za-z0-9._-]+$ ]] || {
            echo "tag version ${tag_ver} is not compatible with Cargo.toml ${cargo_ver}"
            exit 1
          }

  build-linux:
    needs: tag-check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Build debug binary for smoke
        run: cargo build

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"

      - name: Build dist
        run: cargo build --profile dist

      - name: Smoke packaged binary
        run: |
          ./target/dist/pad --help
          ./target/dist/pad --version

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-x86_64-glibc-2.35.tar.gz -C target/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-glibc-2.35
          path: rust-tui/dist/*.tar.gz

  build-linux-arm64:
    needs: tag-check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Install cross compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build
        run: |
          export CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc
          cargo build --profile dist --target aarch64-unknown-linux-gnu

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-aarch64-glibc-2.35.tar.gz -C target/aarch64-unknown-linux-gnu/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-glibc-2.35
          path: rust-tui/dist/*.tar.gz

  build-linux-musl:
    needs: tag-check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Cache cross binary
        id: cross-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cross
            ~/.cargo/bin/cross-util
          key: cross-${{ runner.os }}-${{ runner.arch }}-${{ env.CROSS_VERSION }}

      - name: Install cross
        if: steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --version "${CROSS_VERSION}" --locked

      - name: Build
        run: cross build --profile dist --target x86_64-unknown-linux-musl

      - name: Smoke packaged binary
        run: |
          ./target/x86_64-unknown-linux-musl/dist/pad --help
          ./target/x86_64-unknown-linux-musl/dist/pad --version

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-x86_64-musl.tar.gz -C target/x86_64-unknown-linux-musl/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64-musl
          path: rust-tui/dist/*.tar.gz

  build-linux-musl-arm64:
    needs: tag-check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Cache cross binary
        id: cross-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cross
            ~/.cargo/bin/cross-util
          key: cross-${{ runner.os }}-${{ runner.arch }}-${{ env.CROSS_VERSION }}

      - name: Install cross
        if: steps.cross-cache.outputs.cache-hit != 'true'
        run: cargo install cross --version "${CROSS_VERSION}" --locked

      - name: Build
        run: cross build --profile dist --target aarch64-unknown-linux-musl

      - name: Inspect packaged binary
        run: file ./target/aarch64-unknown-linux-musl/dist/pad

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-linux-aarch64-musl.tar.gz -C target/aarch64-unknown-linux-musl/dist pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-aarch64-musl
          path: rust-tui/dist/*.tar.gz

  build-macos:
    needs: tag-check
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Install tmux
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install tmux
          fi

      - name: Build debug binary for smoke
        run: cargo build

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"

      - name: Build Intel
        run: cargo build --profile dist --target x86_64-apple-darwin

      - name: Build ARM64
        run: cargo build --profile dist --target aarch64-apple-darwin

      - name: Create Universal Binary
        run: |
          mkdir -p target/dist/universal
          lipo -create \
            target/x86_64-apple-darwin/dist/pad \
            target/aarch64-apple-darwin/dist/pad \
            -output target/dist/universal/pad

      - name: Smoke packaged binary
        run: |
          ./target/dist/universal/pad --help
          ./target/dist/universal/pad --version

      - name: Package
        run: |
          mkdir -p dist
          tar -czf dist/pad-${GITHUB_REF_NAME}-macos-universal.tar.gz -C target/dist/universal pad

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: rust-tui/dist/*.tar.gz

  validate-linux-release-compat:
    needs:
      - build-linux
      - build-linux-musl
    name: Validate Linux release install (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-20.04
            image: ubuntu:20.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: ubuntu-22.04
            image: ubuntu:22.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: ubuntu-24.04
            image: ubuntu:24.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: debian-12
            image: debian:12
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: debian-13
            image: debian:13
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: rockylinux-8
            image: rockylinux:8
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo tar gzip xz sed
          - name: rockylinux-9
            image: rockylinux:9
            bootstrap: |
              dnf install -y bash ca-certificates sudo tar gzip xz sed
          - name: fedora-41
            image: fedora:41
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo which tar gzip xz sed
          - name: fedora-42
            image: fedora:42
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo which tar gzip xz sed
          - name: archlinux
            image: archlinux:latest
            bootstrap: |
              pacman -Sy --noconfirm bash curl ca-certificates sudo which tar gzip xz sed
          - name: alpine-3.20
            image: alpine:3.20
            bootstrap: |
              apk add --no-cache bash curl ca-certificates sudo tar gzip xz sed
          - name: alpine-3.22
            image: alpine:3.22
            bootstrap: |
              apk add --no-cache bash curl ca-certificates sudo tar gzip xz sed
    steps:
      - uses: actions/checkout@v4

      - name: Download x86_64 Linux artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: linux-x86_64-*
          path: .pad-release/${{ github.ref_name }}
          merge-multiple: true

      - name: Validate release installer path
        env:
          IMAGE: ${{ matrix.image }}
          BOOTSTRAP: ${{ matrix.bootstrap }}
          INSTALL_MODE: prebuilt
          PAD_TEST_VERSION: ${{ github.ref_name }}
          PAD_TEST_RELEASE_BASE_URL: file:///workspace/.pad-release
        run: bash ./scripts/ci/linux_installer_smoke.sh

  release:
    needs:
      - build-linux
      - build-linux-arm64
      - build-linux-musl
      - build-linux-musl-arm64
      - build-macos
      - validate-linux-release-compat
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/*
          generate_release_notes: true
          body: |
            ## Install

            ### Linux/macOS/WSL2
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/main/install.sh | bash
            ```

            `pad` requires `tmux` at runtime. On WSL2, install and run both `tmux` and `pad` inside WSL.

            ### Manual download
            - Linux x86_64 (glibc 2.35): `pad-*-linux-x86_64-glibc-2.35.tar.gz`
            - Linux ARM64 (glibc 2.35): `pad-*-linux-aarch64-glibc-2.35.tar.gz`
            - Linux x86_64 (musl): `pad-*-linux-x86_64-musl.tar.gz`
            - Linux ARM64 (musl): `pad-*-linux-aarch64-musl.tar.gz`
            - macOS universal: `pad-*-macos-universal.tar.gz`

            ```bash
            tar -xzf pad-*.tar.gz
            mv pad ~/.local/bin/
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
