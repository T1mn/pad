name: Tmux Smoke

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: tmux smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-15
          - macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux tmux
        if: runner.os == 'Linux'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Install macOS tmux
        if: runner.os == 'macOS'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install tmux
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Build debug binary
        working-directory: rust-tui
        run: cargo build

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"
