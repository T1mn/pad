name: Tmux Smoke

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - README.md
      - README_ZH.md
      - docs/**
      - .github/index.md
      - .github/release.yml
      - .github/workflows/index.md
  pull_request:
    paths-ignore:
      - README.md
      - README_ZH.md
      - docs/**
      - .github/index.md
      - .github/release.yml
      - .github/workflows/index.md
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_HTTP_TIMEOUT: "120"
  CARGO_NET_RETRY: "10"

jobs:
  smoke:
    name: tmux smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-15
          - macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux tmux
        if: runner.os == 'Linux'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y tmux
          fi

      - name: Install macOS tmux
        if: runner.os == 'macOS'
        run: |
          if ! command -v tmux >/dev/null 2>&1; then
            brew install tmux
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Build debug binary
        working-directory: rust-tui
        run: |
          for attempt in 1 2 3; do
            if cargo build --locked; then
              exit 0
            fi
            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi
            sleep $((attempt * 10))
          done

      - name: Run tmux smoke
        env:
          PAD_BIN: ${{ github.workspace }}/rust-tui/target/debug/pad
        run: bash "${{ github.workspace }}/scripts/ci/tmux_smoke.sh"
