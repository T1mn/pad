name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  installer-sync:
    name: Installer sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Verify generated install.sh is up to date
        run: |
          bash ./scripts/build_installer.sh
          git diff --exit-code -- install.sh

  rust-checks:
    name: Rust checks (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --profile dist
        run: cargo build --profile dist

  installer-smoke:
    name: Installer smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-22.04
          - macos-26
          - macos-15
          - macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: Build dist binary
        working-directory: rust-tui
        run: cargo build --profile dist

      - name: Prepare local release archive
        shell: bash
        env:
          PAD_TEST_VERSION: v0.0.0-ci
        run: |
          set -euo pipefail
          release_dir="${GITHUB_WORKSPACE}/.pad-release/${PAD_TEST_VERSION}"
          mkdir -p "${release_dir}"
          case "${RUNNER_OS}" in
            Linux)
              filename="pad-${PAD_TEST_VERSION}-linux-x86_64-glibc-2.35.tar.gz"
              ;;
            macOS)
              filename="pad-${PAD_TEST_VERSION}-macos-universal.tar.gz"
              ;;
            *)
              echo "unsupported runner: ${RUNNER_OS}" >&2
              exit 1
              ;;
          esac
          tar -czf "${release_dir}/${filename}" -C "${GITHUB_WORKSPACE}/rust-tui/target/dist" pad

      - name: Run installer from checkout
        env:
          PAD_INSTALL_ASSUME_YES: "1"
          PAD_RELEASE_BASE_URL: file://${{ github.workspace }}/.pad-release
          INSTALL_DIR: ${{ github.workspace }}/.pad-bin
          VERSION: v0.0.0-ci
        run: |
          bash ./install.sh
          "${INSTALL_DIR}/pad" --help
          "${INSTALL_DIR}/pad" --version
          "${INSTALL_DIR}/pad" --tmux-doctor

  linux-prebuilt-fixtures:
    name: Linux prebuilt fixtures
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target
          cache-targets: false

      - name: Build glibc dist binary
        run: cargo build --profile dist

      - name: Install cross
        run: cargo install cross --locked

      - name: Build musl dist binary
        run: cross build --profile dist --target x86_64-unknown-linux-musl

      - name: Inspect glibc binary
        run: |
          file ./target/dist/pad
          ldd ./target/dist/pad

      - name: Inspect musl binary
        run: file ./target/x86_64-unknown-linux-musl/dist/pad

      - name: Prepare local Linux release archives
        shell: bash
        env:
          PAD_TEST_VERSION: v0.0.0-ci
        run: |
          set -euo pipefail
          release_dir="${GITHUB_WORKSPACE}/pad-release-fixtures/${PAD_TEST_VERSION}"
          mkdir -p "${release_dir}"
          tar -czf "${release_dir}/pad-${PAD_TEST_VERSION}-linux-x86_64-glibc-2.35.tar.gz" -C target/dist pad
          tar -czf "${release_dir}/pad-${PAD_TEST_VERSION}-linux-x86_64-musl.tar.gz" -C target/x86_64-unknown-linux-musl/dist pad

      - name: Upload local Linux release archives
        uses: actions/upload-artifact@v4
        with:
          name: linux-prebuilt-fixtures
          path: pad-release-fixtures

  linux-installer-matrix:
    name: Linux installer smoke (${{ matrix.name }})
    needs: linux-prebuilt-fixtures
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-20.04
            image: ubuntu:20.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: ubuntu-22.04
            image: ubuntu:22.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: debian-12
            image: debian:12
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: debian-13
            image: debian:13
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: ubuntu-24.04
            image: ubuntu:24.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates sudo xz-utils tar gzip sed
          - name: rockylinux-8
            image: rockylinux:8
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo tar gzip xz sed
          - name: rockylinux-9
            image: rockylinux:9
            bootstrap: |
              dnf install -y bash ca-certificates sudo tar gzip xz sed
          - name: fedora-41
            image: fedora:41
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo which tar gzip xz sed
          - name: fedora-42
            image: fedora:42
            bootstrap: |
              dnf install -y bash curl ca-certificates sudo which tar gzip xz sed
          - name: archlinux
            image: archlinux:latest
            bootstrap: |
              pacman -Sy --noconfirm bash curl ca-certificates sudo which tar gzip xz sed
          - name: alpine-3.20
            image: alpine:3.20
            bootstrap: |
              apk add --no-cache bash curl ca-certificates sudo tar gzip xz sed
          - name: alpine-3.22
            image: alpine:3.22
            bootstrap: |
              apk add --no-cache bash curl ca-certificates sudo tar gzip xz sed
    steps:
      - uses: actions/checkout@v4

      - name: Download local Linux release archives
        uses: actions/download-artifact@v4
        with:
          name: linux-prebuilt-fixtures
          path: ${{ github.workspace }}/pad-release-fixtures

      - name: Docker installer smoke
        env:
          IMAGE: ${{ matrix.image }}
          BOOTSTRAP: ${{ matrix.bootstrap }}
          INSTALL_MODE: prebuilt
          PAD_TEST_VERSION: v0.0.0-ci
          PAD_TEST_RELEASE_BASE_URL: file:///workspace/pad-release-fixtures
        run: bash ./scripts/ci/linux_installer_smoke.sh

  linux-source-fallback-smoke:
    name: Linux source fallback smoke (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-22.04
            image: ubuntu:22.04
            bootstrap: |
              apt-get update
              apt-get install -y bash curl ca-certificates build-essential pkg-config git sudo xz-utils tar gzip sed
          - name: alpine-3.20
            image: alpine:3.20
            bootstrap: |
              apk add --no-cache bash curl ca-certificates build-base pkgconf git sudo tar gzip xz sed
    steps:
      - uses: actions/checkout@v4

      - name: Docker source fallback smoke
        env:
          IMAGE: ${{ matrix.image }}
          BOOTSTRAP: ${{ matrix.bootstrap }}
          INSTALL_MODE: source
        run: bash ./scripts/ci/linux_installer_smoke.sh

  linux-musl-builds:
    name: Linux musl build (${{ matrix.name }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: x86_64
            target: x86_64-unknown-linux-musl
            smoke: "1"
          - name: aarch64
            target: aarch64-unknown-linux-musl
            smoke: "0"
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target
          cache-targets: false

      - name: Install cross
        run: cargo install cross --locked

      - name: Build musl target
        run: cross build --profile dist --target ${{ matrix.target }}

      - name: Smoke x86_64 musl binary
        if: matrix.smoke == '1'
        run: |
          ./target/${{ matrix.target }}/dist/pad --help
          ./target/${{ matrix.target }}/dist/pad --version

      - name: Inspect aarch64 musl binary
        if: matrix.smoke != '1'
        run: file ./target/${{ matrix.target }}/dist/pad

  macos-build:
    name: macOS build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-26
          - macos-15
          - macos-14
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-tui -> target

      - name: cargo test
        run: cargo test

      - name: cargo build --profile dist
        run: cargo build --profile dist
