name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-checks:
    name: Rust checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test

      - name: cargo build --profile dist
        run: cargo build --profile dist

  installer-smoke:
    name: Installer smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run installer from checkout
        env:
          PAD_INSTALL_FORCE_SOURCE: "1"
          PAD_INSTALL_ASSUME_YES: "1"
          INSTALL_DIR: ${{ github.workspace }}/.pad-bin
        run: |
          bash ./install.sh
          "${INSTALL_DIR}/pad" --help
          "${INSTALL_DIR}/pad" --version

  macos-build:
    name: macOS build
    runs-on: macos-latest
    defaults:
      run:
        working-directory: rust-tui
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: cargo test
        run: cargo test

      - name: cargo build --profile dist
        run: cargo build --profile dist
